<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>学生管理系统</h1>
      <p class="subtitle">简单、高效的学生信息管理</p>
    </header>

    <div class="main-content">
      <!-- 添加/编辑学生表单 -->
      <div class="form-section">
        <h2 id="form-title">添加新学生</h2>
        <form id="student-form">
          <input type="hidden" id="student-id">
          
          <div class="form-row">
            <div class="form-group">
              <label for="name">姓名 <span class="required">*</span></label>
              <input type="text" id="name" name="name" required placeholder="请输入学生姓名">
            </div>
            
            <div class="form-group">
              <label for="studentId">学号 <span class="required">*</span></label>
              <input type="text" id="studentId" name="studentId" required placeholder="请输入学号">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="age">年龄 <span class="required">*</span></label>
              <input type="number" id="age" name="age" required min="0" max="150" placeholder="请输入年龄">
            </div>
            
            <div class="form-group">
              <label for="gender">性别 <span class="required">*</span></label>
              <select id="gender" name="gender" required>
                <option value="">请选择性别</option>
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="class">班级 <span class="required">*</span></label>
              <input type="text" id="class" name="class" required placeholder="请输入班级">
            </div>
            
            <div class="form-group">
              <label for="phone">联系电话</label>
              <input type="tel" id="phone" name="phone" placeholder="请输入联系电话">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="email">电子邮箱</label>
              <input type="email" id="email" name="email" placeholder="请输入电子邮箱">
            </div>
            
            <div class="form-group">
              <label for="address">家庭住址</label>
              <input type="text" id="address" name="address" placeholder="请输入家庭住址">
            </div>
          </div>
          
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">添加学生</button>
            <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">取消编辑</button>
          </div>
        </form>
      </div>

      <!-- 学生列表 -->
      <div class="list-section">
        <div class="list-header">
          <h2>学生列表</h2>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索学生...">
            <button class="btn btn-small" id="search-btn">搜索</button>
          </div>
        </div>
        
        <div class="student-count">
          共 <span id="student-count">0</span> 名学生
        </div>
        
        <div id="student-list" class="student-list">
          <!-- 学生列表将通过JavaScript动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
